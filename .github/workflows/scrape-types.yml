name: Extractor de Tipos Pokemon

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Ahora solo instalamos 'requests' ya que manejamos JSON nativo
    - name: Instalar dependencias
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install requests

    - name: Ejecutar script de Scraping
      run: |
        source venv/bin/activate
        python scrape_types.py

    - name: Guardar cambios en el repositorio
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add pokemon_types.txt
        
        if git diff --staged --quiet; then
          echo "No hay cambios nuevos en los tipos de Pokémon."
        else
          git commit -m "Auto: Actualizar lista de tipos de Pokémon"
          git push
        fi
